<script>
async function enviarPonencia(event) {

  event.preventDefault();

  const WORKER_URL =
  "https://dawn-base-5480.santanderacmi.workers.dev";

  const URL_GRACIAS =
  "https://acmisantander.com.co/magazine/gracias-ponencia/";

  const form =
  document.getElementById("formEnvioPonencia");

  const archivoInput =
  document.getElementById("archivoPonencia");

  const archivo =
  archivoInput && archivoInput.files.length > 0
  ? archivoInput.files[0]
  : null;

  const boton =
  document.getElementById("botonEnviarPonencia");

  const barra =
  document.getElementById("barraPonencia");

  const contenedor =
  document.getElementById("barraContainerPonencia");

  const textoCarga =
  document.getElementById("textoCargaPonencia");

  const mensajeError =
  document.getElementById("mensajeErrorPonencia");

  const opciones =
  document.getElementById("opcionesAlternativasPonencia");

  const limiteBytes =
  100 * 1024 * 1024;

  mensajeError.style.display = "none";
  mensajeError.innerHTML = "";

  if (archivo && archivo.size > limiteBytes) {

    mensajeError.style.display = "block";

    mensajeError.innerHTML =
      "<div style='background:#dc2626;color:white;padding:14px 16px;border-radius:8px;font-weight:700;margin-bottom:14px;text-decoration:underline;'>" +
      "⚠ El archivo supera el límite máximo permitido de 100 MB." +
      "</div>" +
      "Utilice las opciones alternativas.";

    if (opciones) opciones.open = true;

    return false;
  }

  boton.disabled = true;

  boton.innerText =
  "Enviando información...";

  contenedor.style.display =
  "block";

  barra.style.width =
  "20%";

  textoCarga.innerText =
  "Preparando envío...";

  try {

    const datos =
    new FormData();

    datos.append(
      "tipoFormulario",
      "ponencia"
    );

    datos.append(
      "nombrePonente",
      form.Nombre_Ponente.value
    );

    datos.append(
      "afiliacion",
      form.Afiliacion.value
    );

    datos.append(
      "email",
      form.email.value
    );

    datos.append(
      "tituloPonencia",
      form.Titulo_Ponencia.value
    );

    datos.append(
      "evento",
      form.Evento.value
    );

    datos.append(
      "mensaje",
      form.Mensaje.value
    );

    if (form.Link_Ponencia) {

      datos.append(
        "linkPonencia",
        form.Link_Ponencia.value
      );
    }

    if (archivo) {

      datos.append(
        "archivo",
        archivo
      );

      barra.style.width =
      "45%";

      textoCarga.innerText =
      "Cargando archivo adjunto...";
    }

    const respuesta =
    await fetch(WORKER_URL, {
      method: "POST",
      body: datos
    });

    const resultado =
    await respuesta.json();

    if (!respuesta.ok || !resultado.success) {

      throw new Error(
        resultado.error ||
        "No fue posible completar el envío."
      );
    }

    barra.style.width =
    "100%";

    textoCarga.innerText =
    "Ponencia enviada correctamente";

    setTimeout(function() {

      window.location.href =
      URL_GRACIAS;

    }, 1200);

  } catch (error) {

    boton.disabled = false;

    boton.innerText =
    "Enviar información de la ponencia";

    contenedor.style.display =
    "none";

    barra.style.width =
    "0%";

    mensajeError.style.display =
    "block";

    mensajeError.innerHTML =

      "<div style='background:#ea580c;color:white;padding:14px 16px;border-radius:8px;font-weight:700;margin-bottom:14px;'>" +

      "⚠ No fue posible completar el envío." +

      "</div>" +

      "<div style='margin-bottom:12px;'>" +

      error.message +

      "</div>" +

      "Puede intentar nuevamente o usar las opciones alternativas.";

    if (opciones) {
      opciones.open = true;
    }
  }

  return false;
}

document
.getElementById("formEnvioPonencia")
.addEventListener(
  "submit",
  enviarPonencia
);
</script>
