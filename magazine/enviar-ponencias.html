<h1>Enviar ponencia</h1>

<div class="card">

<h2>Recepción de ponencias</h2>

<p>
Formulario institucional para el envío de presentaciones académicas de ACMI Santander.
</p>

<form action="https://formsubmit.co/santanderacmi@gmail.com" method="POST" enctype="multipart/form-data">

<input type="hidden" name="_subject" value="Nueva ponencia recibida — ACMI Santander">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://acmisantander.github.io/Acmisantander/magazine/gracias-ponencia/">

<label><strong>Nombre completo del ponente</strong></label>
<input type="text" name="Ponente" required style="width:100%; padding:12px; margin:8px 0 18px;">

<label><strong>Correo electrónico</strong></label>
<input type="email" name="email" required style="width:100%; padding:12px; margin:8px 0 18px;">

<label><strong>Título de la ponencia</strong></label>
<input type="text" name="Titulo_de_la_ponencia" required style="width:100%; padding:12px; margin:8px 0 18px;">

<label><strong>Evento</strong></label>
<select name="Evento" required style="width:100%; padding:12px; margin:8px 0 18px;">
<option value="">Seleccione el evento</option>
<option>VI Simposio Regional ACMI San Gil Santander</option>
</select>

<label><strong>Enlace de descarga de la presentación</strong></label>
<input type="url" name="Enlace_presentacion" placeholder="Pegue aquí el enlace de Google Drive, OneDrive o Dropbox" style="width:100%; padding:12px; margin:8px 0 18px;">

<button class="btn" type="submit">
Enviar ponencia
</button>

</form>

</div>
