<script>
document.getElementById("formEnvio").addEventListener("submit", async function(event) {

  event.preventDefault();

  const CLOUDFLARE_WORKER_URL =
    "https://dawn-base-5480.santanderacmi.workers.dev";

  const URL_GRACIAS =
    "https://acmisantander.com.co/magazine/gracias.html";

  const form = this;

  const archivoInput = document.getElementById("archivoAdjunto");
  const archivo = archivoInput ? archivoInput.files[0] : null;

  const boton = document.getElementById("botonEnviar");
  const barra = document.getElementById("barra");
  const contenedor = document.getElementById("barraContainer");
  const textoCarga = document.getElementById("textoCarga");
  const mensajeError = document.getElementById("mensajeErrorArchivo");
  const opciones = document.getElementById("opcionesAlternativas");

  const limiteMB = 100;
  const limiteBytes = limiteMB * 1024 * 1024;

  const autor =
    form.querySelector("[name='Autor']") ||
    form.querySelector("[name='autor']") ||
    form.querySelector("[name='Nombre']") ||
    form.querySelector("[name='nombre']");

  const titulo =
    form.querySelector("[name='Titulo']") ||
    form.querySelector("[name='titulo']") ||
    form.querySelector("[name='Título']") ||
    form.querySelector("[name='titulo_manuscrito']");

  mensajeError.style.display = "none";
  mensajeError.innerHTML = "";

  if (archivo && archivo.size > limiteBytes) {

    mensajeError.style.display = "block";

    mensajeError.innerHTML =
      "<div style='background:#dc2626; color:white; padding:14px 16px; border-radius:8px; font-weight:700; margin-bottom:14px; text-decoration:underline;'>" +
      "⚠ El archivo supera el límite máximo permitido de 100 MB." +
      "</div>" +
      "Utilice las opciones alternativas: Drive, Dropbox, OneDrive, WeTransfer o correo institucional.";

    if (opciones) opciones.open = true;

    return false;
  }

  boton.disabled = true;
  boton.innerText = "Subiendo archivo...";

  contenedor.style.display = "block";
  barra.style.width = "15%";
  textoCarga.innerText = "Preparando envío...";

  try {

    if (archivo) {

      const datosCloudflare = new FormData();

      datosCloudflare.append("archivo", archivo);
      datosCloudflare.append("autor", autor ? autor.value : "");
      datosCloudflare.append("titulo", titulo ? titulo.value : "");

      barra.style.width = "35%";
      textoCarga.innerText = "Cargando archivo adjunto...";

      const respuesta = await fetch(CLOUDFLARE_WORKER_URL, {
        method: "POST",
        body: datosCloudflare
      });

      const resultado = await respuesta.json();

      if (!respuesta.ok || !resultado.success) {
        throw new Error(resultado.error || "No fue posible cargar el archivo.");
      }

      barra.style.width = "75%";
      textoCarga.innerText = "Archivo cargado correctamente...";

      const campoR2 = document.createElement("input");
      campoR2.type = "hidden";
      campoR2.name = "Archivo_R2";
      campoR2.value = resultado.fileKey || resultado.url || "Archivo cargado en R2";

      form.appendChild(campoR2);
    }

    boton.innerText = "Enviando información...";
    textoCarga.innerText = "Enviando formulario...";
    barra.style.width = "92%";

    try {
      await fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        mode: "no-cors"
      });
    } catch (errorFormSubmit) {
      console.warn("FormSubmit no respondió, se continúa a la página de gracias.");
    }

    barra.style.width = "100%";
    textoCarga.innerText = "Envío completado";

    window.location.href = URL_GRACIAS;

  } catch (error) {

    boton.disabled = false;
    boton.innerText = "Enviar información al comité editorial";

    contenedor.style.display = "none";
    barra.style.width = "0%";

    mensajeError.style.display = "block";

    mensajeError.innerHTML =
      "<div style='background:#ea580c; color:white; padding:14px 16px; border-radius:8px; font-weight:700; margin-bottom:14px;'>" +
      "⚠ No fue posible cargar el archivo." +
      "</div>" +
      "<div style='margin-bottom:12px;'>" +
      error.message +
      "</div>" +
      "Puede intentar nuevamente o utilizar las opciones alternativas.";

    if (opciones) opciones.open = true;
  }

});
</script>
