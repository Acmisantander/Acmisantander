<script>
async function enviarFormulario(event) {
  event.preventDefault();

  const WORKER_URL = "https://dawn-base-5480.santanderacmi.workers.dev";
  const URL_GRACIAS = "https://acmisantander.com.co/magazine/gracias/";

  const form = document.getElementById("formEnvio");
  const archivoInput = document.getElementById("archivoAdjunto");
  const archivo = archivoInput && archivoInput.files.length > 0 ? archivoInput.files[0] : null;

  const boton = document.getElementById("botonEnviar");
  const barra = document.getElementById("barra");
  const contenedor = document.getElementById("barraContainer");
  const textoCarga = document.getElementById("textoCarga");
  const mensajeError = document.getElementById("mensajeErrorArchivo");
  const opciones = document.getElementById("opcionesAlternativas");

  const limiteBytes = 100 * 1024 * 1024;

  mensajeError.style.display = "none";
  mensajeError.innerHTML = "";

  if (archivo && archivo.size > limiteBytes) {
    mensajeError.style.display = "block";
    mensajeError.innerHTML =
      "<div style='background:#dc2626;color:white;padding:14px 16px;border-radius:8px;font-weight:700;margin-bottom:14px;text-decoration:underline;'>" +
      "⚠ El archivo supera el límite máximo permitido de 100 MB." +
      "</div>" +
      "Utilice las opciones alternativas.";

    if (opciones) opciones.open = true;
    return false;
  }

  boton.disabled = true;
  boton.innerText = "Enviando información...";
  contenedor.style.display = "block";
  barra.style.width = "20%";
  textoCarga.innerText = "Preparando envío...";

  try {
    if (archivo) {
      const datos = new FormData();

      datos.append("archivo", archivo);
      datos.append("autor", form.Autor.value);
      datos.append("afiliacion", form.Afiliacion.value);
      datos.append("email", form.email.value);
      datos.append("titulo", form.Titulo.value);
      datos.append("tipo", form.Tipo.value);
      datos.append("mensaje", form.Mensaje.value);

      if (form.Link_Archivo) {
        datos.append("linkArchivo", form.Link_Archivo.value);
      }

      barra.style.width = "45%";
      textoCarga.innerText = "Cargando archivo adjunto...";

      try {
        const respuesta = await fetch(WORKER_URL, {
          method: "POST",
          body: datos
        });

        const resultado = await respuesta.json();

        if (respuesta.ok && resultado.success) {
          const campoR2 = document.createElement("input");
          campoR2.type = "hidden";
          campoR2.name = "Archivo_R2";
          campoR2.value = resultado.fileKey || "Archivo cargado en Cloudflare R2";
          form.appendChild(campoR2);
        }
      } catch (errorWorker) {
        const campoError = document.createElement("input");
        campoError.type = "hidden";
        campoError.name = "Error_Cloudflare_R2";
        campoError.value = "No se pudo cargar el archivo en R2. Revisar envío alternativo.";
        form.appendChild(campoError);
      }
    }

    barra.style.width = "80%";
    textoCarga.innerText = "Enviando correo de notificación...";

    HTMLFormElement.prototype.submit.call(form);

    barra.style.width = "100%";
    textoCarga.innerText = "Envío completado correctamente";

    setTimeout(function() {
      window.location.href = URL_GRACIAS;
    }, 1200);

  } catch (error) {
    boton.disabled = false;
    boton.innerText = "Enviar información al comité editorial";
    contenedor.style.display = "none";
    barra.style.width = "0%";

    mensajeError.style.display = "block";
    mensajeError.innerHTML =
      "<div style='background:#ea580c;color:white;padding:14px 16px;border-radius:8px;font-weight:700;margin-bottom:14px;'>" +
      "⚠ No fue posible completar el envío." +
      "</div>" +
      "<div style='margin-bottom:12px;'>" +
      error.message +
      "</div>" +
      "Puede intentar nuevamente o usar las opciones alternativas.";

    if (opciones) opciones.open = true;
  }

  return false;
}
</script>
