<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} | ACMI Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Lato',sans-serif;
  background:#f5f7fb;
  color:#243244;
  line-height:1.6;
}

.container{
  width:90%;
  max-width:1150px;
  margin:auto;
}

header{
  background:white;
  border-bottom:4px solid #2a9c52;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.header-flex{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  padding:16px 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  text-decoration:none;
}

.brand-logo-wrap{
  width:74px;
  height:74px;
  border-radius:50%;
  background:white;
  border:1px solid #d7e2ef;
  padding:6px;
  box-shadow:0 4px 10px rgba(0,0,0,0.10);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  flex-shrink:0;
}

.brand-logo{
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:50%;
  display:block;
}

.brand-text h1{
  font-family:'Montserrat',sans-serif;
  margin:0;
  font-size:28px;
  color:#143f7d;
  line-height:1.1;
}

.brand-text p{
  margin:4px 0 0;
  font-size:14px;
  color:#50627a;
}

nav{
  display:flex;
  align-items:center;
  gap:22px;
  flex-wrap:wrap;
}

nav a{
  color:#143f7d;
  text-decoration:none;
  font-weight:700;
}
